        /* --- gallery.html original styles --- */
        /* --- 基础和重置样式 --- */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* 深色背景 */
            color: #fff;
            font-family: -apple-system, BlinkMacMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            overflow: hidden; /* 禁止页面滚动条 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative; /* 粒子背景需要 */
        }

        /* --- 动态粒子背景 --- */
        .particle-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0; /* 确保在最底层 */
            background: radial-gradient(circle at center, rgba(30, 30, 50, 0.8) 0%, rgba(10, 10, 20, 1) 100%);
        }

        .particle {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: moveParticles 20s infinite linear;
            opacity: 0;
            transform-origin: center center;
        }

        @keyframes moveParticles {
            0% {
                transform: translate(var(--x1), var(--y1)) scale(0);
                opacity: 0;
            }
            25% {
                opacity: 0.8;
                transform: translate(var(--x2), var(--y2)) scale(1);
            }
            50% {
                opacity: 0.6;
                transform: translate(var(--x3), var(--y3)) scale(0.8);
            }
            75% {
                opacity: 0.4;
                transform: translate(var(--x4), var(--y4)) scale(0.5);
            }
            100% {
                transform: translate(var(--x5), var(--y5)) scale(0);
                opacity: 0;
            }
        }

        /* --- 3D 场景容器 --- */
        .scene {
            width: 80vw;
            height: 60vh;
            position: relative;
            z-index: 1; /* 确保在粒子背景之上 */
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* 调整透视，用于外部视角 */
        }

        /* --- 旋转体，所有作品的父容器 --- */
        .rotator {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d; /* 关键：使子元素保持3D空间 */
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* 平滑的旋转动画 */
        }

        /* --- 单个作品项 --- */
        .gallery-item {
            position: absolute;
            width: 320px; /* 基础宽度 */
            height: 200px; /* 基础高度 */
            left: 50%;
            top: 50%;
            margin-left: -160px; /* 宽度的一半，使其居中 */
            margin-top: -100px; /* 高度的一半，使其居中 */
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: transform 0.6s ease-out, opacity 0.6s ease-out, box-shadow 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d; /* 启用内部3D变换 */
            background-color: #333; /* 占位色，防止图片加载慢时显示空白 */
            overflow: hidden; /* 防止伪元素溢出 */
        }

        .gallery-item a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: inherit;
            position: relative; /* 确保子内容定位正确 */
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 确保图片/视频覆盖整个区域 */
            border-radius: 10px; /* 略小于父级，留出边框效果 */
            display: block;
            position: relative;
            z-index: 2; /* 确保在光影之上 */
        }

        /* 光影效果 */
        .gallery-item::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1; /* 确保在内容之下 */
            pointer-events: none; /* 确保不影响点击 */
        }

        .gallery-item:hover::before {
            opacity: 1;
        }

        /* 反射效果（模拟） */
        .gallery-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%; /* 反射区域高度 */
            background: linear-gradient(to top, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            transform: scaleY(-1); /* 垂直翻转 */
            transform-origin: bottom;
            opacity: 0; /* 默认隐藏 */
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item.focused {
            transform: translateZ(200px) scale(1.1); /* 聚焦时稍微放大并向前 */
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.6); /* 青色光晕 */
            border-color: rgba(0, 255, 255, 0.6);
            z-index: 10; /* 确保在最上层 */
        }

        .gallery-item.dimmed {
            opacity: 0.3; /* 非聚焦项变暗 */
            pointer-events: none; /* 禁用点击 */
        }

        .gallery-item .title {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px;
            border-radius: 8px;
            font-size: 1.1em;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .gallery-item:hover .title {
            opacity: 1;
        }

        /* 灯箱样式 */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .lightbox.visible {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .lightbox img,
        .lightbox video {
            max-width: 100%;
            max-height: 100%;
            display: block;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        .lightbox .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 101;
        }

        /* 导航箭头 */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            cursor: pointer;
            z-index: 101;
            transition: background 0.3s ease;
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .nav-arrow.left {
            left: 20px;
        }

        .nav-arrow.right {
            right: 20px;
        }
    </style>
</head>
<body>
<div class="particle-background"></div>

<div class="scene">
    <div class="rotator">
    </div>
</div>

<div class="lightbox">
    <div class="close-btn">&times;</div>
    <div class="lightbox-content">
        <img alt="" class="lightbox-image" src="">
        <video class="lightbox-video" controls src=""></video>
    </div>
    <div class="nav-arrow left">&lt;</div>
    <div class="nav-arrow right">&gt;</div>
</div>

<script>
    // --- index.js content starts ---
    var isMenuOpen = false; // Global flag for menu state

    var cursorState = {
        overLink: false,
        overVideoElement: false,
    };

    var bodyElement = document.body;
    var sceneInitialized = false;

    const documentHeight = () => {
        const doc = document.documentElement;
        doc.style.setProperty("--doc-height", `${window.innerHeight}px`);
    };
    window.addEventListener("resize", documentHeight);
    documentHeight();

    // editor autoplay on hover
    function editorAutoplay() {
        // Only run if we're on the editor page
        if (!bodyElement.classList.contains("is-editor")) return;

        const videoContainers = document.querySelectorAll(
            ".is-editor .video-container"
        );

        // Function to detect mobile devices
        function isMobileDevice() {
            return (
                /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
                    navigator.userAgent
                ) || window.innerWidth <= 768
            );
        }

        videoContainers.forEach((container) => {
            const video = container.querySelector("video");
            if (!video) return;

            // Ensure video is muted and ready
            video.muted = true;
            video.volume = 0;

            if (isMobileDevice()) {
                // For mobile devices, autoplay directly
                video.play().catch((error) => {
                    console.error("Error playing video:", error);
                });
            } else {
                // // For desktop, keep the hover behavior
                // container.addEventListener("mouseenter", () => {
                //   video.play().catch((error) => {
                //     console.error("Error playing video:", error);
                //   });
                // });
                // container.addEventListener("mouseleave", () => {
                //   video.pause();
                //   video.currentTime = 0;
                // });
            }
        });
    }

    // project modal
    function projectModal() {
        let currentProjectIndex = 0;
        let projects = [];
        let currentDotPage = 0;
        const dotsPerPage = 4;
        let touchStartX = 0;
        let touchEndX = 0;

        // Function to detect mobile devices
        function isMobileDevice() {
            return (
                /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
                    navigator.userAgent
                ) || window.innerWidth <= 768
            );
        }

        // Add touch event handlers for swipe navigation
        function handleTouchStart(e) {
            touchStartX = e.changedTouches[0].screenX;
        }

        function handleTouchEnd(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }

        function handleSwipe() {
            const swipeThreshold = 50; // minimum distance for swipe
            const swipeDistance = touchEndX - touchStartX;

            if (Math.abs(swipeDistance) > swipeThreshold) {
                if (swipeDistance > 0) {
                    // Swipe right - go to previous project
                    navigateToProject(currentProjectIndex - 1);
                } else {
                    // Swipe left - go to next project
                    navigateToProject(currentProjectIndex + 1);
                }
            }
        }

        // Handle project clicks
        document
            .querySelectorAll(".work-item, .featured-item .project-link")
            .forEach((item) => {
                item.addEventListener("click", function (e) {
                    e.preventDefault();

                    const project = this;
                    const modal = document.querySelector(".project-modal");
                    const video = modal.querySelector("video");
                    const clientName = modal.querySelector(".client-name");
                    const projectName = modal.querySelector(".project-name");
                    const creditsContainer = modal.querySelector(".credits-container");
                    const navDotsContainer = modal.querySelector(".project-nav-dots");
                    const fullscreenBtn = modal.querySelector(".project-fullscreen");
                    const modalInner = modal.querySelector(".project-modal_inner");
                    const videoContainer = modal.querySelector("#videoFullscreenContainer");

                    // Add touch event listeners for swipe navigation
                    modal.addEventListener("touchstart", handleTouchStart, false);
                    modal.addEventListener("touchend", handleTouchEnd, false);

                    // Set the project link on the fullscreen button from data-link
                    if (fullscreenBtn && project.dataset.link) {
                        fullscreenBtn.dataset.projectLink = project.dataset.link;
                    }

                    if (fullscreenBtn) {
                        fullscreenBtn.addEventListener("click", function (e) {
                            e.preventDefault();
                            const modal = document.querySelector(".project-modal");
                            if (modal) {
                                if (
                                    !document.fullscreenElement &&
                                    !document.webkitFullscreenElement
                                ) {
                                    // Enter fullscreen
                                    if (modal.requestFullscreen) {
                                        modal.requestFullscreen();
                                    } else if (modal.webkitRequestFullscreen) {
                                        modal.webkitRequestFullscreen();
                                    } else if (modal.mozRequestFullScreen) {
                                        modal.mozRequestFullScreen();
                                    } else if (modal.msRequestFullscreen) {
                                        modal.msRequestFullscreen();
                                    }
                                } else {
                                    // Exit fullscreen
                                    if (document.exitFullscreen) {
                                        document.exitFullscreen();
                                    } else if (document.webkitExitFullscreen) {
                                        document.webkitExitFullscreen();
                                    } else if (document.mozCancelFullScreen) {
                                        document.mozCancelFullScreen();
                                    } else if (document.msExitFullscreen) {
                                        document.msExitFullscreen();
                                    }
                                }
                            }
                        });
                    }

                    // Add fullscreen change event listener
                    document.addEventListener("fullscreenchange", handleFullscreenChange);
                    document.addEventListener(
                        "webkitfullscreenchange",
                        handleFullscreenChange
                    );
                    document.addEventListener(
                        "mozfullscreenchange",
                        handleFullscreenChange
                    );
                    document.addEventListener("MSFullscreenChange", handleFullscreenChange);

                    function handleFullscreenChange() {
                        const modal = document.querySelector(".project-modal");
                        const videoOverlay = modal.querySelector(".video-overlay");
                        const isFullscreen =
                            document.fullscreenElement ||
                            document.webkitFullscreenElement ||
                            document.mozFullScreenElement ||
                            document.msFullscreenElement;

                        if (isFullscreen) {
                            // Store original styles before changing them
                            videoOverlay.dataset.originalAspectRatio =
                                videoOverlay.style.aspectRatio;
                            videoOverlay.dataset.originalHeight = videoOverlay.style.height;

                            // Show controls in fullscreen
                            modal.querySelector(".project-fullscreen").style.display = "flex";
                            modal.querySelector(".project-close").style.display = "flex";
                            modal.querySelector(".sound-controls").style.display = "flex";
                            modal.querySelector(".project-modal_info").style.display = "block";
                            modal.querySelector(".project-modal_inner").style.width = "100%";
                            modal.querySelector(".project-modal_inner").style.height = "100%";
                            modal.querySelector(".project-modal_inner").style.maxWidth = "none";
                            modal.querySelector(".project-modal_inner").style.margin = "0";
                            modal.querySelector(".project-modal_inner").style.borderRadius =
                                "0";
                            modal.querySelector(".video-wrapper").style.width = "100vw";
                            modal.querySelector(".video-wrapper").style.height = "100vh";

                            // Set fullscreen styles for video overlay
                            videoOverlay.style.aspectRatio = "auto";
                            videoOverlay.style.height = "100%";
                        } else {
                            // Reset controls display and modal styles
                            modal.querySelector(".project-fullscreen").style.display = "";
                            modal.querySelector(".project-close").style.display = "";
                            modal.querySelector(".sound-controls").style.display = "";
                            modal.querySelector(".project-modal_info").style.display = "";
                            modal.querySelector(".project-modal_inner").style.width = "";
                            modal.querySelector(".project-modal_inner").style.height = "";
                            modal.querySelector(".project-modal_inner").style.maxWidth = "";
                            modal.querySelector(".project-modal_inner").style.margin = "";
                            modal.querySelector(".project-modal_inner").style.borderRadius = "";
                            modal.querySelector(".video-wrapper").style.width = "";
                            modal.querySelector(".video-wrapper").style.height = "";

                            // Restore original video overlay styles
                            videoOverlay.style.aspectRatio =
                                videoOverlay.dataset.originalAspectRatio || "";
                            videoOverlay.style.height =
                                videoOverlay.dataset.originalHeight || "";
                        }
                    }

                    // Get all projects and current index
                    // Get unique projects by filtering out duplicates based on data attributes
                    projects = Array.from(
                        document.querySelectorAll(".work-item, .featured-item .project-link")
                    ).filter(
                        (item, index, self) =>
                            index ===
                            self.findIndex(
                                (t) =>
                                    t.getAttribute("data-video") ===
                                    item.getAttribute("data-video") &&
                                    t.getAttribute("data-cover") === item.getAttribute("data-cover")
                            )
                    );
                    currentProjectIndex = projects.indexOf(project);

                    // Calculate which page the current project is on
                    currentDotPage = Math.floor(currentProjectIndex / dotsPerPage);

                    // Update navigation dots
                    updateNavigationDots();

                    updateProjectContent(project);

                    // Show modal
                    modal.classList.add("active");

                    // If on mobile and has a video, add click handler to open in native player
                    if (isMobileDevice() && project.dataset.mobileVideo) {
                        const videoWrapper = modal.querySelector(".video-wrapper");
                        if (videoWrapper) {
                            videoWrapper.addEventListener("click", function () {
                                window.location.href = project.dataset.mobileVideo;
                            });
                        }
                    }

                    // Add mousemove event listener for navigation arrows
                    const projectNavLeft = document.querySelector(".project-nav-left");
                    const navArrowLeft = document.querySelector(".nav-arrow-left");
                    const projectNavRight = document.querySelector(".project-nav-right");
                    const navArrowRight = document.querySelector(".nav-arrow-right");
                    const customCursor = document.getElementById("circle-cursor");

                    if (projectNavLeft && navArrowLeft) {
                        projectNavLeft.addEventListener("mousemove", function (e) {
                            const rect = projectNavLeft.getBoundingClientRect();
                            const x = e.clientX - rect.left;
                            const y = e.clientY - rect.top;

                            navArrowLeft.style.left = x + "px";
                            navArrowLeft.style.top = y + "px";
                            if (customCursor) {
                                customCursor.style.display = "none";
                                customCursor.style.opacity = "0";
                            }
                            navArrowLeft.style.opacity = "1";
                            if (navArrowRight) navArrowRight.style.opacity = "0";
                        });

                        projectNavLeft.addEventListener("mouseleave", function () {
                            if (customCursor) {
                                customCursor.style.display = "block";
                                customCursor.style.opacity = "1";
                            }
                            navArrowLeft.style.opacity = "0";
                        });
                    }

                    if (projectNavRight && navArrowRight) {
                        projectNavRight.addEventListener("mousemove", function (e) {
                            const rect = projectNavRight.getBoundingClientRect();
                            const x = e.clientX - rect.left;
                            const y = e.clientY - rect.top;

                            navArrowRight.style.left = x + "px";
                            navArrowRight.style.top = y + "px";
                            if (customCursor) customCursor.style.display = "none";
                            navArrowRight.style.opacity = "1";
                            if (navArrowLeft) navArrowLeft.style.opacity = "0";
                        });

                        projectNavRight.addEventListener("mouseleave", function () {
                            if (customCursor) customCursor.style.display = "block";
                            navArrowRight.style.opacity = "0";
                        });
                    }
                });
            });

        // Handle navigation arrow clicks
        document
            .querySelector(".project-nav-left")
            .addEventListener("click", function (e) {
                e.stopPropagation();
                navigateToProject(currentProjectIndex - 1);
            });

        document
            .querySelector(".project-nav-right")
            .addEventListener("click", function (e) {
                e.stopPropagation();
                navigateToProject(currentProjectIndex + 1);
            });

        // Add mobile navigation button handlers
        document
            .querySelector(".mobile-nav-btn.prev-btn")
            .addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();
                navigateToProject(currentProjectIndex - 1);
            });

        document
            .querySelector(".mobile-nav-btn.next-btn")
            .addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();
                navigateToProject(currentProjectIndex + 1);
            });

        function updateNavigationDots() {
            const navDotsContainer = document.querySelector(".project-nav-dots");
            navDotsContainer.innerHTML = "";

            // Calculate start and end indices for current page
            const startIndex = currentDotPage * dotsPerPage;
            const endIndex = Math.min(startIndex + dotsPerPage, projects.length);

            // Add dots for current page
            for (let i = startIndex; i < endIndex; i++) {
                const dot = document.createElement("div");
                dot.className = `project-nav-dot ${
                    i === currentProjectIndex ? "active" : ""
                }`;
                dot.addEventListener("click", () => navigateToProject(i));
                navDotsContainer.appendChild(dot);
            }
        }

        function updateProjectContent(project) {
            const modal = document.querySelector(".project-modal");
            const posterVideo = modal.querySelector(".video-poster");
            const fullVideo = modal.querySelector("#video-modal");
            const clientName = modal.querySelector(".client-name");
            const projectName = modal.querySelector(".project-name");
            const creditsContainer = modal.querySelector(".credits-container");
            const videoPosterWrapper = modal.querySelector(".video-poster_wrapper");
            const projectControls = modal.querySelector(".project-controls");

            // Stop current videos
            posterVideo.pause();
            if (videojs(fullVideo.id)) {
                videojs(fullVideo.id).pause();
            }

            // Reset project controls
            projectControls.classList.remove("controls-play", "controls-pause");
            projectControls.classList.add("controls-play");

            // Get video sources
            const posterVideoSrc = project.dataset.video || "";
            const fullVideoSrc = project.dataset.full || "";

            // Update video sources only if they exist
            if (posterVideoSrc) {
                posterVideo.src = posterVideoSrc;
                videoPosterWrapper.style.display = "block";
                posterVideo.play();
            } else {
                videoPosterWrapper.style.display = "none";
            }

            // Initialize or update the video player only if there's a full video
            let player;
            if (fullVideoSrc) {
                if (videojs(fullVideo.id)) {
                    player = videojs(fullVideo.id);
                    player.src({src: fullVideoSrc, type: "video/mp4"});
                } else {
                    player = videojs(fullVideo.id, {
                        controls: true,
                        preload: "auto",
                        playsInline: true,
                        loop: true,
                        loadingSpinner: false,
                        fill: true,
                        userActions: {
                            click: false,
                            doubleClick: false,
                        },
                        controlBar: {
                            progressControl: {
                                enabled: true,
                            },
                        },
                    });
                }

                // Auto play video on desktop when modal opens
                if (window.innerWidth >= 960) {
                    setTimeout(() => {
                        videoPosterWrapper.style.display = "none";
                        player.play();
                        player.muted(false);
                        projectControls.classList.add("controls-pause");
                        projectControls.classList.remove("controls-play");
                        document.querySelector(".sound-controls").classList.add("sound-on");
                        document
                            .querySelector(".sound-controls")
                            .classList.remove("sound-off");
                    }, 100);
                }
            } else {
                // If no full video, hide the video player
                fullVideo.style.display = "none";
            }

            // Set up timeupdate event listener
            player.on("timeupdate", function () {
                var currentTime = this.currentTime();
                var duration = this.duration();
                var formattedTime = formatTime(currentTime);
                const progressElement = document.querySelector(".vjs-play-progress");
                if (progressElement) {
                    progressElement.setAttribute("data-time", formattedTime);
                    // Update the progress bar position
                    const progressPercent = (currentTime / duration) * 100;
                    progressElement.style.width = progressPercent + "%";
                }
            });

            // Update project info
            const truncateText = (text, maxLength = 30) => {
                if (!isMobileDevice()) return text;
                return text.length > maxLength
                    ? text.substring(0, maxLength) + "..."
                    : text;
            };

            clientName.textContent = truncateText(project.dataset.client);
            projectName.textContent = truncateText(project.dataset.project, 30);

            // Clear and update credits
            creditsContainer.innerHTML = "";
            if (project.dataset.credits) {
                const credits = JSON.parse(project.dataset.credits);
                credits.forEach((credit) => {
                    const creditDiv = document.createElement("div");
                    creditDiv.className = "flex flex-column flex-row-l mb3 mb1-l";
                    creditDiv.innerHTML = `
                        <p class="ttu w-third-l nowrap">${truncateText(
                        credit.role,
                        30
                    )}</p>
                        <p class="nowrap">${truncateText(credit.person, 30)}</p>
                    `;
                    creditsContainer.appendChild(creditDiv);
                });
            } else {
                // Fallback for featured projects that have credits in the DOM
                const credits = project.querySelectorAll(".flex.mb1");
                credits.forEach((credit) => {
                    const creditDiv = credit.cloneNode(true);
                    // Apply truncation to the cloned credit elements
                    const roleElement = creditDiv.querySelector(".ttu.w-third");
                    const personElement = creditDiv.querySelector("p:not(.ttu)");
                    if (roleElement)
                        roleElement.textContent = truncateText(roleElement.textContent, 16);
                    if (personElement)
                        personElement.textContent = truncateText(
                            personElement.textContent,
                            20
                        );
                    creditsContainer.appendChild(creditDiv);
                });
            }

            // Update navigation dots
            updateNavigationDots();
        }

        function navigateToProject(index) {
            if (index >= 0 && index < projects.length) {
                currentProjectIndex = index;
                currentDotPage = Math.floor(index / dotsPerPage);
                updateProjectContent(projects[currentProjectIndex]);
            }
        }

        // Handle keyboard navigation
        document.addEventListener("keydown", function (e) {
            const modal = document.querySelector(".project-modal");
            if (modal.classList.contains("active")) {
                if (e.key === "ArrowLeft") {
                    navigateToProject(currentProjectIndex - 1);
                } else if (e.key === "ArrowRight") {
                    navigateToProject(currentProjectIndex + 1);
                }
            }
        });

        // Close modal function
        function closeModal() {
            const modal = document.querySelector(".project-modal");
            const posterVideo = modal.querySelector(".video-poster");
            const fullVideo = modal.querySelector("#video-modal");
            const projectControls = modal.querySelector(".project-controls");
            // Exit fullscreen if active
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
            // Stop both videos
            posterVideo.pause();
            // Assuming videojs is loaded, otherwise this will throw an error
            // if (videojs(fullVideo.id)) {
            //   videojs(fullVideo.id).pause();
            // }
            // Reset project controls
            projectControls.classList.remove("controls-play", "controls-pause");
            projectControls.classList.add("controls-play");
            modal.classList.remove("active");
            fullVideo.currentTime = 0;
        }

        // Close modal on button click
        const closeButton = document.querySelector(".modal-close");
        if (closeButton) {
            closeButton.addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();
                closeModal();
            });
        }

        // Close modal on ESC key
        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                closeModal();
            }
        });

        // Close modal on clicking outside the modal content
        document
            .querySelector(".project-modal")
            .addEventListener("click", function (e) {
                if (e.target === this) {
                    closeModal();
                }
            });
    }

    // work filters
    function workFilters() {
        let selectedProject = null;
        let selectedEditor = null;
        const workItems = document.querySelectorAll(".work-item");
        const projectFilterItems = document.querySelectorAll(
            '[data-filter="project"] .filter-item'
        );
        const editorFilterItems = document.querySelectorAll(
            '[data-filter="editor"] .filter-item'
        );

        // Select all data-filter elements
        const filterElements = document.querySelectorAll("[data-filter]");
        // Select all filter-panel elements
        const filterPanels = document.querySelectorAll(".filter-panel");
        const closeFilterButtons = document.querySelectorAll(".close-filter");

        // Function to close all filter panels
        function closeAllFilterPanels() {
            filterPanels.forEach((panel) => {
                panel.classList.remove("filter-open");
            });
            // Remove 'panel-visible' class from all elements with class '.work'
            const workElements = document.querySelectorAll(".work");
            workElements.forEach((workElement) => {
                workElement.classList.remove("panel-visible");
            });
        }

        closeFilterButtons.forEach((closeButton) => {
            closeButton.addEventListener("click", function (event) {
                event.stopPropagation(); // Prevent event from bubbling up
                closeAllFilterPanels();
            });
        });

        // Add event listener to each filter element
        filterElements.forEach((element) => {
            element.addEventListener("click", function () {
                // Find the associated filter-panel for this filter
                const filterPanel = this.querySelector(".filter-panel");
                const filterArrow = this.querySelector(".filter-arrow"); // Add this line
                const filterCat = this.querySelector(".work-cat"); // Add this line

                // Check if the filter-panel is open
                const isOpen = filterPanel.classList.contains("filter-open");

                // Close all filter panels first except the one clicked
                filterPanels.forEach((panel) => {
                    if (panel !== filterPanel) {
                        panel.classList.remove("filter-open");
                        // Remove 'is-rotated' class from filter-arrow elements of other panels
                        const arrow = panel.parentElement.querySelector(".filter-arrow");
                        const cat = panel.parentElement.querySelector(".work-cat");
                        if (arrow) {
                            arrow.classList.remove("is-rotated");
                            cat.classList.remove("is-active-cat");
                        }
                    }
                });

                // Allow to click outside the filter to close
                document.addEventListener("click", function (event) {
                    // Check if the click is outside any filter panel or filter element
                    const isClickInsideFilterPanel = event.target.closest(".filter-panel");
                    const isClickInsideFilterElement = event.target.closest("[data-filter]");

                    // If the click is outside both, close all filter panels
                    if (!isClickInsideFilterPanel && !isClickInsideFilterElement) {
                        closeAllFilterPanels();
                    }
                });

                // Toggle the 'filter-open' class on the clicked filter-panel
                if (!isOpen && filterPanel) {
                    filterPanel.classList.add("filter-open");
                    // Add 'panel-visible' class to elements with class '.work'
                    const workElements = document.querySelectorAll(".work");
                    workElements.forEach((workElement) => {
                        workElement.classList.add("panel-visible");
                    });
                    // Toggle the 'is-rotated' class on the filter-arrow
                    if (filterArrow) {
                        filterArrow.classList.add("is-rotated");
                        filterCat.classList.add("is-active-cat");
                    }
                } else {
                    if (filterPanel) {
                        filterPanel.classList.remove("filter-open");
                        // Remove 'is-rotated' class from the filter-arrow
                        if (filterArrow) {
                            filterArrow.classList.remove("is-rotated");
                            filterCat.classList.remove("is-active-cat");
                        }
                    }
                    // Remove 'panel-visible' class when filter is closed
                    const workElements = document.querySelectorAll(".work");
                    workElements.forEach((workElement) => {
                        workElement.classList.remove("panel-visible");
                    });
                }
            });
        });

        // Function to filter work items
        function filterWorkItems() {
            workItems.forEach((item) => {
                const projectType = item.dataset.projectType;
                const editorType = item.dataset.editorType;

                const isProjectMatch =
                    !selectedProject || selectedProject === projectType;
                const isEditorMatch = !selectedEditor || selectedEditor === editorType;

                if (isProjectMatch && isEditorMatch) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        }

        projectFilterItems.forEach((item) => {
            item.addEventListener("click", function () {
                // Remove active class from all project filter items
                projectFilterItems.forEach((filter) =>
                    filter.classList.remove("active")
                );

                // Add active class to the clicked item
                this.classList.add("active");

                // Set selected project filter
                selectedProject = this.dataset.filterValue;
                filterWorkItems();
            });
        });

        editorFilterItems.forEach((item) => {
            item.addEventListener("click", function () {
                // Remove active class from all editor filter items
                editorFilterItems.forEach((filter) =>
                    filter.classList.remove("active")
                );

                // Add active class to the clicked item
                this.classList.add("active");

                // Set selected editor filter
                selectedEditor = this.dataset.filterValue;
                filterWorkItems();
            });
        });
    }

    // custom slider (for projects)
    function customSlider() {
        const slider = document.querySelector(".custom-slider_inner");
        const slides = document.querySelectorAll(".custom-slider_slide");
        const dotsContainer = document.querySelector(".custom-slider_dots");
        const dots = [];
        let currentSlide = 0;
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        // Create dots
        slides.forEach((_, index) => {
            const dot = document.createElement("div");
            dot.classList.add("dot");
            if (index === 0) dot.classList.add("active");
            dotsContainer.appendChild(dot);
            dots.push(dot);
        });

        function updateSlider() {
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
            dots.forEach((dot, index) => {
                dot.classList.toggle("active", index === currentSlide);
            });
        }

        function goToSlide(index) {
            currentSlide = index;
            updateSlider();
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlider();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateSlider();
        }

        // Event Listeners
        dots.forEach((dot, index) => {
            dot.addEventListener("click", () => goToSlide(index));
        });

        // Touch Events
        function handleSwipe() {
            const diff = startX - currentX;
            if (Math.abs(diff) > 50) {
                // Minimum swipe distance
                if (diff > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            } else {
                updateSlider(); // Return to current slide
            }
            isDragging = false;
        }

        slider.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
            isDragging = true;
        });

        slider.addEventListener("touchmove", (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX;
            const diff = startX - currentX;
            slider.style.transform = `translateX(calc(-${
                currentSlide * 100
            }% + ${-diff}px))`;
        });

        slider.addEventListener("touchend", handleSwipe);
        slider.addEventListener("touchcancel", handleSwipe);

        // Initialize
        updateSlider();
    }

    // Function to hide play button overlays
    function hidePlayButtonOverlays() {
        const playButtonOverlays = document.querySelectorAll(".play-button-overlay");
        playButtonOverlays.forEach((overlay) => {
            overlay.style.display = "none";
        });
    }

    // Particles
    function createParticleBackground(containerId, numParticles) {
        const container = document.querySelector(containerId);
        if (!container) return; // Ensure the container exists

        for (let i = 0; i < numParticles; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            container.appendChild(particle);

            const size = Math.random() * 8 + 2; // Particle size between 2px and 10px
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            // Set random start and end positions for animation variables
            for (let j = 1; j <= 5; j++) {
                particle.style.setProperty(`--x${j}`, `${Math.random() * 100}vw`);
                particle.style.setProperty(`--y${j}`, `${Math.random() * 100}vh`);
            }

            particle.style.animationDelay = `${Math.random() * -20}s`; // Stagger animations
            particle.style.animationDuration = `${Math.random() * 15 + 15}s`; // Randomize duration
        }
    }

    // Call the function to create particles when the page loads
    document.addEventListener('DOMContentLoaded', () => {
        createParticleBackground('.particle-background', 100); // 100 particles
    });


    // 3D 画廊逻辑
    document.addEventListener('DOMContentLoaded', () => {
        const rotator = document.querySelector('.rotator');
        const lightbox = document.querySelector('.lightbox');
        const lightboxImage = document.querySelector('.lightbox-image');
        const lightboxVideo = document.querySelector('.lightbox-video');
        const closeBtn = document.querySelector('.lightbox .close-btn');
        const prevArrow = document.querySelector('.nav-arrow.left');
        const nextArrow = document.querySelector('.nav-arrow.right');

        const projectsData = [
            {
                type: 'image',
                src: 'https://via.placeholder.com/600x400/FF5733/FFFFFF?text=Project+1',
                thumb: 'https://via.placeholder.com/320x200/FF5733/FFFFFF?text=Thumb+1',
                title: '赛博朋克城市一角'
            },
            {
                type: 'video',
                src: 'https://www.w3schools.com/html/mov_bbb.mp4', // 示例视频
                thumb: 'https://via.placeholder.com/320x200/33FF57/FFFFFF?text=Thumb+2',
                title: '未来交通系统'
            },
            {
                type: 'image',
                src: 'https://via.placeholder.com/600x400/3357FF/FFFFFF?text=Project+3',
                thumb: 'https://via.placeholder.com/320x200/3357FF/FFFFFF?text=Thumb+3',
                title: '虚拟现实世界'
            },
            {
                type: 'image',
                src: 'https://via.placeholder.com/600x400/F333FF/FFFFFF?text=Project+4',
                thumb: 'https://via.placeholder.com/320x200/F333FF/FFFFFF?text=Thumb+4',
                title: '数字艺术装置'
            },
            {
                type: 'image',
                src: 'https://via.placeholder.com/600x400/FFC300/FFFFFF?text=Project+5',
                thumb: 'https://via.placeholder.com/320x200/FFC300/FFFFFF?text=Thumb+5',
                title: '全息投影设计'
            },
            {
                type: 'video',
                src: 'https://www.w3schools.com/html/mov_bbb.mp4', // 示例视频
                thumb: 'https://via.placeholder.com/320x200/DAF7A6/000000?text=Thumb+6',
                title: '智能家居交互'
            },
            {
                type: 'image',
                src: 'https://via.placeholder.com/600x400/900C3F/FFFFFF?text=Project+7',
                thumb: 'https://via.placeholder.com/320x200/900C3F/FFFFFF?text=Thumb+7',
                title: 'AI 城市规划'
            },
            {
                type: 'image',
                src: 'https://via.placeholder.com/600x400/581845/FFFFFF?text=Project+8',
                thumb: 'https://via.placeholder.com/320x200/581845/FFFFFF?text=Thumb+8',
                title: '生物工程界面'
            }
        ];

        let angle = 0;
        const radius = 600; // 旋转半径
        let isDragging = false;
        let startX = 0;
        let currentRotationY = 0;
        let autoRotateInterval;
        let currentLightboxIndex = 0;
        let isFocused = false; // 新增：记录是否有作品被聚焦

        // 动态创建作品项
        function createGalleryItems() {
            projectsData.forEach((project, index) => {
                const item = document.createElement('div');
                item.classList.add('gallery-item');
                item.dataset.index = index; // 存储索引

                const contentElement = project.type === 'image' ? document.createElement('img') : document.createElement('video');
                contentElement.src = project.thumb;
                if (project.type === 'video') {
                    contentElement.autoplay = true; // 自动播放缩略视频
                    contentElement.loop = true;
                    contentElement.muted = true;
                    contentElement.playsInline = true;
                }
                item.appendChild(contentElement);

                const titleElement = document.createElement('div');
                titleElement.classList.add('title');
                titleElement.textContent = project.title;
                item.appendChild(titleElement);

                rotator.appendChild(item);
            });
            positionItems();
        }

        // 根据数据定位作品项
        function positionItems() {
            const numItems = projectsData.length;
            const slice = 360 / numItems; // 每个作品项的角度间隔

            document.querySelectorAll('.gallery-item').forEach((item, index) => {
                const itemAngle = index * slice;
                const x = radius * Math.sin(itemAngle * Math.PI / 180);
                const z = radius * Math.cos(itemAngle * Math.PI / 180);
                item.style.transform = `translate3d(${x}px, 0, ${-z}px) rotateY(${itemAngle}deg)`;
                item.style.setProperty('--initial-transform', item.style.transform); // 存储初始transform
            });
        }

        // 启动自动旋转
        function startAutoRotate() {
            stopAutoRotate(); // 确保只有一个计时器在运行
            autoRotateInterval = setInterval(() => {
                if (!isDragging && !isFocused) { // 只有在没有拖拽且没有作品聚焦时才自动旋转
                    angle += 0.05; // 旋转速度
                    rotator.style.transform = `rotateY(${angle}deg)`;
                }
            }, 20); // 每20ms更新一次
        }

        // 停止自动旋转
        function stopAutoRotate() {
            clearInterval(autoRotateInterval);
        }

        // 鼠标拖拽旋转
        rotator.addEventListener('mousedown', (e) => {
            if (isFocused) return; // 聚焦状态下禁用拖拽
            isDragging = true;
            startX = e.clientX;
            currentRotationY = angle; // 记录当前的旋转角度
            rotator.style.transition = 'none'; // 拖拽时取消过渡
            document.body.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const diffX = e.clientX - startX;
            angle = currentRotationY + diffX * 0.2; // 调整拖拽敏感度
            rotator.style.transform = `rotateY(${angle}deg)`;
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = 'default';
                rotator.style.transition = 'transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55)'; // 拖拽结束后恢复平滑过渡
            }
        });

        document.body.addEventListener('mouseleave', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = 'default';
                rotator.style.transition = 'transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55)';
            }
        });

        // 点击作品项打开灯箱
        rotator.addEventListener('click', (e) => {
            const item = e.target.closest('.gallery-item');
            if (item) {
                const index = parseInt(item.dataset.index);
                currentLightboxIndex = index;
                openLightbox(index);
            }
        });

        // 打开灯箱
        function openLightbox(index) {
            isFocused = true; // 设置聚焦状态
            stopAutoRotate(); // 停止自动旋转

            const allItems = document.querySelectorAll('.gallery-item');
            allItems.forEach(item => {
                item.classList.add('dimmed'); // 所有作品变暗
                // 重置所有作品的hover transform，以避免聚焦时出现残留
                item.style.transform = item.style.getPropertyValue('--initial-transform');
            });
            allItems[index].classList.remove('dimmed'); // 当前作品取消变暗
            allItems[index].classList.add('focused'); // 当前作品聚焦

            const project = projectsData[index];
            if (project.type === 'image') {
                lightboxImage.src = project.src;
                lightboxImage.style.display = 'block';
                lightboxVideo.style.display = 'none';
            } else {
                lightboxVideo.src = project.src;
                lightboxVideo.style.display = 'block';
                lightboxVideo.play();
                lightboxImage.style.display = 'none';
            }
            lightbox.classList.add('visible');
        }

        // 关闭灯箱
        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('visible');
            lightboxVideo.pause(); // 暂停视频
            lightboxVideo.removeAttribute('src'); // 清除视频源

            // 恢复所有作品的样式
            const allItems = document.querySelectorAll('.gallery-item');
            allItems.forEach(item => {
                item.classList.remove('focused', 'dimmed');
                // 恢复hover效果的transform
                item.style.transform = item.style.getPropertyValue('--initial-transform');
            });
            isFocused = false; // 重置聚焦状态
            startAutoRotate(); // 重新启动自动旋转
        });

        // 点击灯箱背景关闭
        lightbox.addEventListener('click', (e) => {
            // 只有点击灯箱背景时才关闭，不包括点击里面的图片/视频
            if (e.target === lightbox || e.target === lightboxImage || e.target === lightboxVideo) {
                lightbox.classList.remove('visible');
                lightboxVideo.pause(); // 暂停视频
                lightboxVideo.removeAttribute('src'); // 清除视频源

                // 恢复所有作品的样式
                const allItems = document.querySelectorAll('.gallery-item');
                allItems.forEach(item => {
                    item.classList.remove('focused', 'dimmed');
                    // 恢复hover效果的transform
                    item.style.transform = item.style.getPropertyValue('--initial-transform');
                });
                isFocused = false; // 重置聚焦状态
                rotator.style.transition = 'transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55)'; // 拖拽结束后恢复平滑过渡
                startAutoRotate(); // 重新启动自动旋转
            }
        });


        // 灯箱导航箭头
        prevArrow.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止事件冒泡到灯箱背景
            currentLightboxIndex = (currentLightboxIndex - 1 + projectsData.length) % projectsData.length;
            openLightbox(currentLightboxIndex);
        });

        nextArrow.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止事件冒泡到灯箱背景
            currentLightboxIndex = (currentLightboxIndex + 1) % projectsData.length;
            openLightbox(currentLightboxIndex);
        });

        // 键盘左右箭头导航
        document.addEventListener('keydown', (e) => {
            if (lightbox.classList.contains('visible')) {
                if (e.key === 'ArrowLeft') {
                    currentLightboxIndex = (currentLightboxIndex - 1 + projectsData.length) % projectsData.length;
                    openLightbox(currentLightboxIndex);
                } else if (e.key === 'ArrowRight') {
                    currentLightboxIndex = (currentLightboxIndex + 1) % projectsData.length;
                    openLightbox(currentLightboxIndex);
                } else if (e.key === 'Escape') {
                    closeBtn.click(); // 模拟点击关闭按钮
                }
            }
        });

        // 初始化
        createGalleryItems();
        startAutoRotate(); // 页面加载后开始自动旋转
    });
    // --- index.js content ends ---
</script>
